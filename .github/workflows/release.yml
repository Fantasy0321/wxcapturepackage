name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows release
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build installer
        run: yarn dist

      - name: Package unpacked app
        shell: pwsh
        run: |
          $zipName = "WMPF-Debugger-$env:RELEASE_TAG-win-x64-unpacked.zip"
          Compress-Archive -Path "release/win-unpacked/*" -DestinationPath "release/$zipName" -Force

      - name: Upload GitHub release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = @()
          $assets += Get-ChildItem release -Filter "*.exe" | ForEach-Object { $_.FullName }
          $assets += Get-ChildItem release -Filter "*.blockmap" | ForEach-Object { $_.FullName }
          $assets += Get-ChildItem release -Filter "*.zip" | ForEach-Object { $_.FullName }

          gh release view $env:RELEASE_TAG 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG `
              --title "WMPF Debugger $env:RELEASE_TAG" `
              --generate-notes
          }

          gh release upload $env:RELEASE_TAG @assets --clobber
